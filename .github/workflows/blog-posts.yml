name: Latest blog posts

on:
  schedule:
    # Every day at 06:00 UTC — keeps the README in sync with new posts.
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest posts into README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: 'https://www.mariusargatu.com/blog/rss.xml'
          max_post_count: 4
          template: '- [$title]($url)$newline'
          commit_message: 'chore: refresh latest blog posts'
